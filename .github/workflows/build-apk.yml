name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=2"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: 验证项目结构
        run: |
          echo "📁 检查项目结构..."
          ls -la
          echo ""
          echo "📂 检查 Android 项目目录..."
          if [ -d "android_native_project" ]; then
            echo "✅ android_native_project 目录存在"
            ls -la android_native_project/
          else
            echo "❌ android_native_project 目录不存在"
            exit 1
          fi
      
      - name: 修复 Gradle Wrapper 权限
        run: |
          echo "🔧 修复 Gradle Wrapper 权限..."
          chmod +x android_native_project/gradlew
          chmod +x android_native_project/gradle/wrapper/gradle-wrapper.jar
          echo "✅ 权限修复完成"
      
      - name: 下载 Gradle Wrapper 缓存
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('android_native_project/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-wrapper-
      
      - name: 配置 Gradle 网络优化
        run: |
          echo "🌐 配置 Gradle 网络优化..."
          cd android_native_project
          if [ ! -f "gradle.properties" ]; then
            cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.parallel=true
          org.gradle.daemon=true
          org.gradle.caching=true
          EOF
          fi
          echo "✅ Gradle 配置完成"
      
      - name: 验证 Gradle 环境
        run: |
          echo "🔍 验证 Gradle 环境..."
          cd android_native_project
          echo "☕ Java 版本:"
          java -version
          echo "📋 Gradle Wrapper 版本信息:"
          ./gradlew --version || echo "⚠️ Gradle Wrapper 执行失败，继续尝试构建"
      
      - name: 清理构建缓存
        run: |
          echo "🧹 清理构建缓存..."
          cd android_native_project
          ./gradlew clean --no-daemon || echo "⚠️ 清理命令执行失败，继续构建"
      
      - name: 构建调试版 APK
        run: |
          echo "🚀 开始构建 Android APK..."
          cd android_native_project
          echo "🏗️ 执行 Gradle 构建..."
          timeout 30m ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all || {
            echo "❌ 构建失败，尝试降级构建..."
            ./gradlew assembleDebug --no-daemon --stacktrace
          }
      
      - name: 验证 APK 文件
        run: |
          echo "🔍 验证生成的 APK 文件..."
          APK_PATH="android_native_project/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK 文件生成成功！"
            ls -lh "$APK_PATH"
            echo "📦 文件信息:"
            file "$APK_PATH"
          else
            echo "❌ APK 文件未生成"
            echo "📂 检查输出目录:"
            find android_native_project/app/build/outputs -name "*.apk" || echo "未找到任何 APK 文件"
            exit 1
          fi
      
      - name: 上传 APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: pixel-cake-debug-apk
          path: android_native_project/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
      
      - name: 上传构建日志
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs
          path:
            - android_native_project/build_output.log
            - android_native_project/app/build/outputs/logs/
          retention-days: 7
          if-no-files-found: ignore
      
      - name: 显示构建信息
        if: success()
        run: |
          echo "🎉 构建完成！"
          echo "📱 APK 文件: android_native_project/app/build/outputs/apk/debug/app-debug.apk"
          echo "📦 文件大小:"
          ls -lh android_native_project/app/build/outputs/apk/debug/app-debug.apk
          echo ""
          echo "🔗 下载链接: 在 Actions 页面 查看 Artifacts"
      
      - name: 构建失败处理
        if: failure()
        run: |
          echo "❌ 构建失败诊断信息："
          echo "📋 项目结构:"
          ls -la android_native_project/
          echo ""
          echo "🔧 Gradle 配置:"
          cat android_native_project/gradle/wrapper/gradle-wrapper.properties || echo "无法读取配置文件"
          echo ""
          echo "📝 最后的构建日志:"
          if [ -f "android_native_project/build_output.log" ]; then
            tail -50 android_native_project/build_output.log
          fi
